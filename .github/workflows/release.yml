name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"

      - name: Detect version
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            echo "VERSION=$version" >> "$GITHUB_ENV"
            echo "DO_RELEASE=true" >> "$GITHUB_ENV"
          else
            version="$(python3 -c 'import sys; sys.path.insert(0, "bin"); from codexswitch_common import VERSION; print(VERSION)')"
            echo "VERSION=$version" >> "$GITHUB_ENV"
            if git rev-parse "v$version" >/dev/null 2>&1; then
              echo "Tag v$version already exists – nothing to release"
              echo "DO_RELEASE=false" >> "$GITHUB_ENV"
            else
              echo "New version $version – preparing release"
              echo "DO_RELEASE=true" >> "$GITHUB_ENV"
            fi
          fi

      - name: Install dependencies
        if: env.DO_RELEASE == 'true'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          python3 -m pip install pytest

      - name: Compile Python entry points
        if: env.DO_RELEASE == 'true'
        run: |
          python3 -m py_compile \
            bin/codexswitch \
            bin/codexswitch-tui \
            bin/codex-provider-proxy \
            bin/codex-opencode-go-proxy \
            bin/codex-openrouter-proxy \
            bin/codex-azure-proxy \
            bin/opencode-go-token \
            bin/openrouter-token \
            bin/codexswitch_common.py

      - name: Validate shell scripts
        if: env.DO_RELEASE == 'true'
        run: bash -n install.sh uninstall.sh

      - name: Run test suite
        if: env.DO_RELEASE == 'true'
        run: python3 -m pytest tests/ -v

      - name: Build Go launcher binaries
        if: env.DO_RELEASE == 'true'
        run: |
          mkdir -p dist
          build() {
            local goos=$1
            local goarch=$2
            local name=$3
            GOOS=$goos GOARCH=$goarch go build \
              -trimpath \
              -ldflags "-s -w" \
              -o "dist/$name" \
              ./cmd/codexswitch
          }
          build windows amd64 codexswitch-windows-amd64.exe
          build linux amd64 codexswitch-linux-amd64
          build linux arm64 codexswitch-linux-arm64
          build darwin amd64 codexswitch-darwin-amd64
          build darwin arm64 codexswitch-darwin-arm64
          (cd dist && sha256sum * > SHA256SUMS)

      - name: Extract changelog section
        if: env.DO_RELEASE == 'true'
        run: |
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if ! test -s release-notes.md; then
            echo "No CHANGELOG.md section found for $VERSION" >&2
            exit 1
          fi

      - name: Create tag (branch push only)
        if: env.DO_RELEASE == 'true' && github.ref_type != 'tag'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release $VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub release
        if: env.DO_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$VERSION" \
            --title "CodexSwitch v$VERSION" \
            --notes-file release-notes.md \
            dist/*
