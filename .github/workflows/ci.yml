name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install TUI dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python entry points
        run: |
          python -m py_compile \
            bin/codexswitch \
            bin/codexswitch-tui \
            bin/codex-opencode-go-proxy \
            bin/opencode-go-token

      - name: Validate shell scripts
        run: bash -n install.sh uninstall.sh
